[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/users*"
  to = "https://nodejs212.dszcbaross.edu.hu/users/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api*"
  to = "https://nodejs212.dszcbaross.edu.hu/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/mines*"
  to = "https://nodejs212.dszcbaross.edu.hu/mines/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200